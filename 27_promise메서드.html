<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promise 메서드</title>

    <script>
        /*
            Promise.all([p1, p2, p3]) // 비동기 작업이 들어감
                   .then(result = >{
                    console.log(result)
                   })

            - 모든 Promise가 성공해야 then을 실행
            - 1개라도 실패하면 catch 실행
            - 병렬 처리용(비동기 작업이기 때문에)

            Promise.race([p1, p2])
                   .then(result => console.log(result))
            - 가장 먼저 완료된 Promise 하나의 결과를 사용
            - 성공/실패 상관없이 먼저 끝난 것을 기준

            Promise.allSettled([p1, p2]).then(results => console.log(results))
            - 모든 Promise의 성공/실패 결과를 모두 반환
            - 실패해도 중된되지 않음

            Promise.any([p1, p2]).then(result => console.log(result)).catch(err => console.log(err))
            - 하나라도 성공하면 then 실행
            - 모두 실패하여 catch 실행

        */
    </script>

</head>
<body>
    <script>
        function getApple(){
            return new Promise((resolve)=>{
                setTimeout(() => {
                    resolve('🍎')
                }, 3000)
            })
        }

        function getBanana(){
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve('🍌')
                }, 1000)
            })
        }

        function getOrange(){
            return Promise.reject(new Error("오렌지 없음"))
        }
        
        // 순차 처리 (Promise 체이닝)
        getBanana().then((banana) => getApple().then((apple) => [banana, apple]))
            .then(console.log)

        // 병렬 처리(하나라도 실패하면 전체 실패)
        Promise.all([getBanana(), getApple()])
            .then((fruits)=> console.log('all', fruits))
        // Promise.all([getBanana(), getApple(), getOrange()])
        //     .then((fruits)=> console.log('all', fruits))

        // 가장 빨리 수행된 것이 실행
        Promise.race([getBanana(), getApple()]).then((fruit) => console.log('race', fruit)) 

        // 여러 프로미스를 병렬로 처리하되 하나의 프로미스가 실패해도 무조건 실행
        Promise.allSettled([getBanana(), getApple(), getOrange()]).then((fruits) => console.log('allSettled', fruits)).catch(console.log)

    </script>
</body>
</html>
