<body>
    <h1>if / else if / else 예제</h1>
    <script>
        let age = 15

        if (age > 19) {
            console.log("성인입니다")
        }else if(age > 14) {
            console.log("청소년입니다")
        }else if(age > 7) {
            console.log("어린이입니다")
        }else{
            console.log("유아입니다")
        }
    </script>
    <hr>
    <h1>switch문 예제</h1>
    <script>
        let mbti = "ENFP"

        switch(mbti) {
            case "INFJ":
                console.log("조용하지만 깊은 통찰력")
                break
            case "ENFP":
                console.log("열정 가득")
                break
            case "ISTJ":
                console.log("현실주의자")
                break
            case "ENTJ":
                console.log("리더쉽이 뛰어남")
                break
            default:
                console.log("등록되지 않은 MBTI")
        }
    </script>
