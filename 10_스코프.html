<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스코프</title>
    <script>
        /*
            스코프의 종류
            전역 스코프
                - 어느 곳에서든 접근 가능한 최상위 범위
                - 브라우저 환경에서는 전역에서 var로 선언한 변수는 보통window의 프로퍼티가 되지만 let/const는 전역에 선언해도 전역 객체 프로퍼티로 붙지 않는 차이가 있음
                var a = 1 // window.a = 1 (함수 밖에서 선언된 변수라고 보면 됨)
                let b = 2 // window.b = (x) 사용할 수 없다

            함수 스코프
                - 함수 내부에서 선언된 변수
                - var는 블록의 중괄호를 무시하고 함수 단위로만 스코프가 결정되는 함수 스코프를 가짐
                - var를 블록 안에서 선언해도 함수 밖에서 접근 가능한 경우가 많아 버그의 원인이 될 수 있음
                - function test() {
                    if(true) {
                        var x = 10
                        console.log(x)
                    }
                    console.log(x) // 블록 밖에서도 접근됨 var는 정말 안쓰는게 낫다
                }
            
            블록 스코프
                - {}(블록) 단위로 범위가 결정되는 스코프
                - let 과 const는 블록 스코프를 가지므로 if, for, while, try/catch등의 블록 안에서 선언하면 그 블록 밖에서는 접근할 수 없음
                if(true) {
                    let y = 20
                    const z = 30
                }
                console.log(y) // error
                console.log(z) // error

            지역 스코프
                - 보통 전역이 아닌 모든 스코프(함수, 블록 등)를 통칭하는 말
                function outer() {
                    const local = "지역 변수"
                    console.log(local) //ok
                }
                console.log(local) // error

            렉시컬 스코프(정적스코프)
                - 함수가 어디에서 호출 되었는지가 아니라 어디에 선언 되었는지에 따라 상위 스코프가 결정됨
                - 내부 함수는 자신이 선언된 위치 기준으로 바깥 변수에 접근할 수 있음
                const x = "전역"
                function outer(){
                    const x = "outer"
                    function inner(){
                        console.log(x) // "outer" 선언 위치 기준으로 상위
                    }
                    inner
                }
                outer

            스코프 체인
                - 변수를 찾을 때 자바스크립트는 현재 스코프 -> 상위 스코프 -> ... -> 전역 스코프 순서로 올라가며 검색
                - 이 연결 구조를 스코프 체인이라고 함
        */

    </script>
</head>
<body>
    <script>
        var a = 1
        let b = 2
        const c = 3

        function func1() {
            console.log(a, b, c) // 모두 접근 가능
        }

        func1()
        console.log(window.a) // 1
        console.log(window.b) // undefined 변수가 없음

        function func2() {
            if (true) {
                var x = 10
                let y = 20
            }
            console.log(x)
            // console.log(y) error
        }

        function func3(){
            const x = "outer"
            function inner() {
                console.log(x)
            }
            inner()
        }
        func3()

        

    </script>
</body>
</html>
