<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <script>
        /*
            DOM
            DOM(Document Object Model)은 HTML 문서를 트리 구조의 객체로 표현한 것으로, 자바스크립트를 통해 웹페이지의 요소를 선택하고 내용이나 스타일을 변경하며, 요소를 추가/삭제하는 등 동적인 화면 조작을 가능하게 해주는 인터페이스

            DOM 작동 원리
            1. 브라우저가 HTML 파일을 읽음
            2. HTML 태그를 하나하나 분석하여 트리 구조의 객체를 생성
            3. 각 태그는 노드라는 객체가 됨
            4. 자바스크립트는 DOM 객체를 통해 화면을 제어

            Document 객체
                -웹페이지 전체를 표현하는 최상위 DOM 객체로, HTML 문서에 직접 접근하고 조작할 수 있는 핵심 객체
                - 브라우저가 HTML 파일을 로드하면 자동으로 Document 객체가 생성되며, 이 객체를 통해 웹페이지의 요소들을 선택하거나 생성, 수정, 삭제할 수 있음

            


        */
    </script>
</head>
<body>
    <p id="greeting">안녕하세요</p>
    <p class="item">아이템1</p>
    <p class="item">아이템2</p>
    <p class="desc">1번째 문장</p>
    <p class="desc">2번째 문장</p>
    <ul id="list">
        <li>기존 항목</li>
    </ul>
    <p><img id="image" src="/images/spring1.png" alt="봄1"></p>
    <p id="notice">이 문장은 곧 사라집니다.</p>
    <hr>

    <div id="box"></div>
    

    <hr>
    <button onclick="changeText()">텍스트 바꾸기</button>
    <button onclick="highlightItems()">강조</button>
    <button onclick="updateFirst()">1번째 문장만 바꾸기</button>
    <button onclick="updateDesc()">1/2번째 문장만 바꾸기</button>
    <button onclick="addItem()">항목 추가</button>
    <button onclick="removeItem()">항목 삭제</button>
    <button onclick="insertItem()">선 항목 추가</button>
    <button onclick="chageImage()">이미지 변경</button>
    <button onclick="removeText()">삭제</button>
    <hr>

    <button onclick="appendP()">새 문단 추가</button>
    <button onclick="copyChild()">노드 복제</button>

    <script>
        function changeText(){
             document.getElementById("greeting").innerText = " 반가워요 "
        }
        
        function highlightItems(){
            const items = document.getElementsByClassName("item")
            for(let i=0; i< items.length; i++){
                items[i].style.color = "deeppink"
            }
        }

        function updateFirst(){
            const item = document.querySelector(".desc")
            item.innerHTML = "<h1>바뀐 문장</h1>"
        }

        function updateDesc(){
            const items = document.querySelectorAll(".desc")
            for(let i=0; i<items.length; i++){
                items[i].innerHTML = "<h1>바뀐 문장</h1>"
            }
            
        }

        function addItem(){
            const newItem = document.createElement("li") // <li></li>
            newItem.innerText = "새 항목" // <li>새 항목</li>
            document.getElementById("list").appendChild(newItem)

        }
        function chageImage(){
            document.getElementById("image").setAttribute("src","./images/spring2.png")
        }

        function removeText(){
            document.getElementById("notice").remove()
        }

        function appendP(){
            const div = document.getElementById("box")
            const p = document.createElement("p")
            p.innerText = "새 문단 추가!"
            div.appendChild(p)
        }

        function removeItem(){
            const ul = document.getElementById("list")
            const li = document.querySelector("li")
            ul.removeChild(li)
        }

        function insertItem(){
            const ul = document.getElementById("list")
            const newItem = document.createElement("li")
            newItem.innerText = "사과"
            const firstItem = ul.firstElementChild
            ul.insertBefore(newItem, firstItem)
        }

        function copyChild(){
            const original = document.getElementById("list")
            const clone = original.cloneNode(true)
            document.body.appendChild(clone)
        }



    </script>
</body>
</html>
