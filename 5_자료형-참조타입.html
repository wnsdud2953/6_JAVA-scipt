<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료형-참조타입</title>
    <script>
        /*
            참조타입
            값의 주소(참조)를 저장하며 여러 값을 묶어 관리할 수 있음

            Object: 키와 값의 쌍으로 이루어진 객체
                let user = { name: "김사과", age : 20 } 딕셔너리와 닮음
            Array: 여러 값을 순서대로 저장
                let scores + [90, 80, 70] 리스트와 닮았지만 타입이 달라도 저장이 가능함
            Function: 실행 가능한 코드 블록
                function hello() { console.log("안녕하세요") }
                let hello = function(){ console.log("안녕하세요") }

            원시 타입의 저장 방식
                - 값 그 자체가 변수에 직접 저장
                - 숫자나 문자열을 변수에 넣으면, 그 변수 안에 실제 값이 들어감
                - 다른 변수에 복사하면 완전히 새로운 값이 복사되며, 한쪽을 변경해도 다른 쪽에는 영향을 주지 않음
            
            참조 타입의 저장 방식
                - 값이 저장된 위치(주소)를 변수에 저장
                - 객체나 배열을 변수에 담으면, 변수에는 실제 데이터가 아니라 데이터가 있는 곳의 주소가 들어감
                - 다른 변수에 할당하면 같은 데이터를 가리키게 되고, 한쪽에서 값을 수정하면 다른 쪽에서도 변경된 결과가 보임
            
            스택 vs 힙
            스택(Stack)
                - 프로그램 실행 중 함수 호출과 지역 변수, 매개변수 같은 임시 데이터가 저장되는 메모리 공강
                - 코드가 실행되는 순서대로 쌓였다가 함수가 종룍되면 자동으로  제거되는 후입선출 구조를 가지며, 관리가 단순하고 접근 속도가 빠르다는 장점이 있음
            힙(heap)
                - 객체, 배열처럼 크기가 유동적이거나 오래 유지되어야 하는 데이터가 저장되는 메모리 공강
                - 프로그램 실행 중 필요할 때 할당되고, 더이상 사용되지 않으면 가비지 컬렉터에 의해 정리되며, 스택보다 관리가 복잡하지만 큰 데이터와 공유 데이터를 다루기에 적합
        */
    </script>
</head>
<body>
    <script>
        // 객체 let은 값을 바꿀 수 있고 const는 값이 변경 안됨
        const user = { name: "김사과", age: 20 }
        console.log("user 객체: ", user)
        console.log("user 객체 타입: ", typeof user)
        
        // 배열
        const scores = [90, 80, 100, 60]
        console.log("user 배열: ", scores)
        console.log("user 배열 타입: ", typeof scores)

        // 함수
        function greet() {
            console.log("안녕하세요")
        }
        console.log("user 함수: ", greet)
        console.log("user 함수 타입: ", typeof greet)

        // 참조 타입의 특징
        const copyUser = user
        copyUser.age = 25
        console.log("원본 user: ", user)
        console.log("복사본 copyUser: ", copyUser)

        //

    </script>
</body>
</html>
