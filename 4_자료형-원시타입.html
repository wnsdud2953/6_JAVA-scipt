<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료형 - 원시 타입</title>
    <script>
        /*
            원시 타입
            원시 타입은 하나의 값만 저장하며, 값 자체가 변수에 직접 저장됩니다.
            
            Number: 숫자형 데이터. 정수, 실수, 음수, 양수 모두 포함
                let age = 20
                let price = 3.14
            string: 문자열 데이터.큰따옴표(" "), 작은따옴표(' '), 백틱(` `)
                let name = "김사과" 리터널로 저장
                let naem = String("김사과") 객체를 통한 저장
            boolean: 참(true) / 거짓(false)
                let isLogin = true
            undefined: 값이 할당되지 않은 상태. 변수를 선언했지만 값을 할당하지 않았을 때 자동으로 undefined
                let value (값이 그냥 없음)
            null: 의도적으로 값이 없음을 표현
                let data = null (값을 의도적으로 아직 안넣음)
            Bigint: 매우 큰 정수를 표현. 일반 number로 표현할 수 없는 큰 정수를 다룰 때 사용
                let bignumber = 1234567890123456789n(값이 너무 커서 다 표기하기 힘들때 사용)
                Number.MAX_SAFE_INTEGER

        */
       console.log(Number.MAX_SAFE_INTEGER)
    </script>
</head>
<body>
    <h1>원시 타입 예제</h1>
    <script>
        let age = 20
        let name = '김사과'
        let inStudent = true
        let result
        let data = null
        let age2 = age
        age2 = 25
        // typof(age)
        console.log("age: ",age, typeof age)
        console.log("age2: ",age2, typeof age2)
        console.log("name: ",name, typeof name)
        console.log("inStudent: ",inStudent, typeof inStudent)
        console.log("result: ",result, typeof result)
        console.log("data: ",data, typeof data)
    </script>
</body>
</html>
