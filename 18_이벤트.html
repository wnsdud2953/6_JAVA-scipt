<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트</title>
    <style>
        #clickArea {
            width: 300px;
            height: 150px;
            background-color: rgb(255, 255, 255);
            border: 1px solid #aaa;
            line-height: 150px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
    <script>
        /*
            이벤트(Event)
            - 사용자가 웹 페이지와 상호작용할 때 발생하는 특정 동작이나 상황을 의미
            - 버튼 클릭, 키보드 입력, 마우스 이동, 폼 제출, 창 닫기 등
            - 특정 반응(동작)을 하도록 코드를 작성
                이벤트 리스너를 등록
                addEventListener()

            이벤트 문법
            대상(요소) + 이벤트 종류(발생) + 실행할 함수(실행)

        */
    </script>
</head>
<body>
<form action="./result">
        <button onclick="sayHello()">인사하기</button>
        <button id="eventBtn">이벤트 리스너 사용</button>

        <div id="clickArea">여기를 클릭하세요</div>
        <input type="text" id="inputBox" placeholder="키보드를 눌러보세요">
</form>
    <script>
        function sayHello(){
            alert("안녕하세요!")
        }

        /*
            마우스
                click(클릭), dblclick(더블 클릭), mousedown(마우스 버튼 눌었을 때),
                mouseup(마우스 버튼을 뗐을 때), mouseenter(마우스를 요소 위에 올렸을 때),
                mouseleave(요소에서 마우스가 벗어났을 때), mousemove(마우스를 움직일 때)

            키보드
                keydown(키를 누르는 순간), keyup(키를 눌렀다 뗐을 때), keypress(문자 키 입력시 -사용x)

            폼
                submit(폼이 제출될 때), input(입력값이 변경될 때), change(입력이 끝나고 값이 변경될 때), focus(입력창에 포커스가 생길때), blur(입력창에서 포커스가 사라질 때)

            문서
                load(페이지가 모두 로드 되었을 때), resize(브라우저 크기를 변경할 때), scroll(페이지를 스크롤 할 때)

            터치(모바일)
                touchstart(화면을 터치 했을 때), touchmove(터치한 채로 움직일 때), touchend( 터치를 뗏을때)

            드래그
                dragstart(요소를 누를 때), drag(요소를 움직일 때), dragend(요소를 뗐을 때)

            이벤트 객체
                - 이벤트가 발생했을 때 브라우저가 자동으로 생성해 이벤트 핸들러 함수에 전달하는 이벤트 관련 정보 묶음 객체
                - 요소에서 이벤트가 발생했는지(target),어떤 종류의 이벤트인지(type), 마우스 좌표나 키 입력 정보 등 다양한 데이터를 담고 있음
                - 
        */


        const eventBtn = document.getElementById("eventBtn")
        eventBtn.addEventListener("click", function() {
            alert("addEventListener로 연결된 이벤트!!")
        })

        eventBtn.addEventListener("mouseenter", function() {
            eventBtn.style.backgroundColor = "deeppink"
        })

        eventBtn.addEventListener("mouseleave", function(){
            eventBtn.style.backgroundColor = ""
        })



        document.getElementById("clickArea").addEventListener("click",function(event){
            alert(`클릭한 위치: X=${event.clientX}, Y=${event.clientY}\n`+
                `이벤트 타입: ${event.type}\n`+
                 `이벤트 대상: ${event.target.id}`
            )
        })

        document.getElementById('inputBox').addEventListener("keydown", function(event){
            console.log("입력된 키: ",event.key)
            console.log("코드: ", event.code)
            console.log("이벤트 발생한 요소: ",event.target)
        })
        document.getElementById("inputBox").addEventListener("keypress",function(event){
            if(event.key === 'Enter'){
                event.preventDefault()
                alert("엔터키는 막았노라")
            }
        })
    </script>


</body>
</html>
