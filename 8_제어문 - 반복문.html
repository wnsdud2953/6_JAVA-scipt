<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        /*
            while(조건식){
                조건식이 true일 동안 실행될 코드
            } // 조건식이 true일때까지

            do {
                반복 실행할 코드
            }while(조건식)

            for(초기식; 조건식; 증감식){
                조건식이 true일 동안 반복 실행할 코드
            }
        */
    </script>
</head>
<body>
    <h1>while 문</h1>
    <script>
        let dan = 7
        let i = 1

        while(i <= 9){
            console.log(`${dan} * ${i} = ${dan * i}`)
            i++
        }
    </script>

    <h1>Do ~ while 문</h1>
    <script>
        let num = 10
        do {
            console.log(`현재 num: ${num}`)
            num++
        }while(num <= 9)
    </script>

    <h1>for 문</h1>
    <script>
        /*
        let i=1
        
        while(i<=5){
            console.log(`현재 i의 값: ${i}`)
            i++
        }
        */
        for(let i=1; i<=5; i++){
            console.log(`현재 i의 값: ${i}`)
        }

    </script>
    <hr>
    <h1>중첩 for문 구구단</h1>
    <script>
        for(let dan = 2; dan <= 9; dan++){
            for(let i = 1; i <= 9; i++){
                console.log(`${dan} * ${i} = ${dan * i}`)
            }
        }
    </script>
    <hr>
    <h1> break 문</h1>
    <script>
        for(let i=1; i<=10; i++){
            if(i > 5) break
            console.log(`i의 값: ${i}`)
        }
    </script>

    <h1> continue</h1>
    <script>
        for(let i=1; i<=100; i++){
            if(i % 3 ==0){
                continue
            }
            console.log(`i의 값: ${i}`)
        }
    </script>
</body>
</html>
