<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>localStorage</title>
    <script>
        /*
            localStorage
            -브라우저가 제공하는 웹스토리지 기능 중하나로, 자바스크립트를 통해 키/값 형태의 데이터를 브라우저에 영구적으로 저장할 수 있느 저장소
            - 브라우저별로 약 5mb 내외 저장 제한이 있음
            - 문자열만 저장 가능
            - 같은 도메인에서만 접근 가능
            - 민감한 정보(비밀번호, 토큰 등)는 저장하면 안됨

            데이터 저장
            localStorage.setItem("키, 값")

            데이터 불러오기
            const value = localStorage.getItem("키")
            
            데이터 삭제/모든 데이터 삭제
            localStorage.removeItem("키")
            localStorage.clear()
        */
    </script>
</head>
<body>
    <button onclick="saveUser()">사용자 저장</button>
    <button onclick="loadUser()">사용자 불러오기</button>

    <div id="info" style="margin-top: 10px;"></div>

    <script>
        function saveUser() {
            const user = { name:"김사과", age: 20, job: "개발자" }

            localStorage.setItem("user",JSON.stringify(user))
        }
        function loadUser(){
            const data = localStorage.getItem("user")
            if(data) {
                const user = JASON.parse(data)
                document.getElementById("info").innerText = `이름:${user.name},나이:${user.age}, 직업: ${user.job}`
            }
        }
    </script>
</body>
</html>
